controller_manager:
  ros__parameters:
    update_rate: 200
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    suspension_controller:
      type: effort_controllers/JointGroupEffortController

    wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

diff_drive_controller:
  ros__parameters:
    use_sim_time: true
    left_wheel_names:  [wheel_fl_joint, wheel_ml_joint, wheel_rl_joint]
    right_wheel_names: [wheel_fr_joint, wheel_mr_joint, wheel_rr_joint]

    wheel_separation: 0.64
    wheel_radius: 0.13
    # 六轮差速（滑移转向）：放大等效轮距补偿轮胎侧滑
    wheel_separation_multiplier: 1.6

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    enable_odom_tf: true
    pose_covariance_diagonal:  [0.01, 0.01, 0.01, 0.01, 0.01, 0.05]
    twist_covariance_diagonal: [0.01, 0.01, 0.01, 0.01, 0.01, 0.05]

    use_stamped_vel: false
    cmd_vel_timeout: 0.5
    linear.x.max_velocity: 1.5
    linear.x.min_velocity: -1.5
    angular.z.max_velocity: 2.0
    angular.z.min_velocity: -2.0

suspension_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - susp_fl_joint
      - susp_fr_joint
      - susp_ml_joint
      - susp_mr_joint
      - susp_rl_joint
      - susp_rr_joint

# v5 RL path: per-wheel independent velocity control (replaces diff_drive_controller)
# Topic: /wheel_velocity_controller/commands (Float64MultiArray, LEGS order fl/fr/ml/mr/rl/rr)
wheel_velocity_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - wheel_fl_joint
      - wheel_fr_joint
      - wheel_ml_joint
      - wheel_mr_joint
      - wheel_rl_joint
      - wheel_rr_joint

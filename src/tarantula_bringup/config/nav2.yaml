# Nav2 配置（Humble）—— 与 slam_toolbox 在线建图共用（map->odom 由 SLAM 提供，
# 无 AMCL/map_server）。cmd_vel 直接进入 motion_control_node 的 /cmd_vel。

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /tarantula/truth_odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: true
    # 本机算力有限且仿真 RTF 低，实测 10Hz 跟不上（loop missed rate），降到 5
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # 窄门/地形上低速蠕动属正常，进度判据放宽（0.3/20 实测在门口误杀）
      required_movement_radius: 0.15
      movement_time_allowance: 30.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      # 速度包络：崎岖路实测 0.8 m/s 可行，导航留余量取 0.6。
      # 允许倒车：碎石颠偏后贴墙，长车体原地转会把 footprint 扫进膨胀区
      # 致所有轨迹被否决（实测僵死），倒车是唯一逃逸自由度
      min_vel_x: -0.2
      max_vel_x: 0.6
      min_vel_y: 0.0
      max_vel_y: 0.0
      # 滑移转向原地转大量打滑，转速 >0.6 时 10Hz 扫描匹配跟不上里程计
      # 角度误差（实测 1.0 rad/s 自旋恢复后 map 系转歪 102 度），全局限转速
      max_vel_theta: 0.6
      min_speed_xy: 0.0
      max_speed_xy: 0.6
      min_speed_theta: 0.0
      acc_lim_x: 0.8
      acc_lim_y: 0.0
      acc_lim_theta: 1.0
      decel_lim_x: -0.8
      decel_lim_y: 0.0
      decel_lim_theta: -1.0
      vx_samples: 20
      vy_samples: 0
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      # ObstacleFootprint 而非 BaseObstacle：1.32×0.78 长方形车体过 1.6m 窄门，
      # 只查中心点代价会斜切贴墙（实测离门墩 3cm 致全局规划起点落入致死区）；
      # footprint 碰撞检查让擦墙轨迹直接判废
      critics: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "GoalAlign",
                "PathAlign", "PathDist", "GoalDist"]
      ObstacleFootprint.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.325
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.325
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # 车体含轮实测包络 1.26×0.71 m，长方形用多边形 footprint（圆半径会把
      # 1.6m 窄门膨胀死）
      footprint: "[[0.66, 0.39], [0.66, -0.39], [-0.66, -0.39], [-0.66, 0.39]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        # 用姿态门控后的扫描：倾斜帧打地的幻影障碍曾把走廊堵死（导航死锁）
        observation_sources: scan
        scan:
          topic: /scan_gated
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.66, 0.39], [0.66, -0.39], [-0.66, -0.39], [-0.66, 0.39]]"
      resolution: 0.05
      track_unknown_space: true
      # 只用 SLAM 静态地图 + 膨胀，不挂 obstacle_layer：车身在坡上倾斜时
      # 2D 雷达扫描面打地产生幻影障碍，若写入全局 costmap 会永久堵路；
      # 局部 costmap 的 raytrace 清除能自愈，全局交给 SLAM 地图本身
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    # Smac 2D 而非 NavFn：边建图边导航时目标常在未知区深处，NavFn 的
    # 势场梯度提取在均匀未知区域会失败（实测 "Failed to create a plan
    # from potential when a legal potential was found"），Smac 无此缺陷
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      allow_unknown: true
      max_planning_time: 2.0
      downsample_costmap: false
      cost_travel_multiplier: 2.0

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    # 自旋恢复同样受滑移转向打滑约束（见 FollowPath.max_vel_theta 注释）
    max_rotational_vel: 0.5
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.0

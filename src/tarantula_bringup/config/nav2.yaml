# Nav2 配置（Humble）—— 静态地图（nav_static.launch.py）和在线 SLAM
# （nav.launch.py）共用大部分参数（DWB/SMAC/behavior_server 调优、footprint）。
# 两者唯一的真实差异是 costmap 静态层的数据源：static 模式有离线预算好的
# terrain_cost_map（来自已知 heightmap），SLAM 模式探索阶段不可能有这种
# 先验数据，只能用 slam_toolbox 实时发布的 /map。这部分差异由
# nav2_slam_costmap_overlay.yaml 在 nav.launch.py 里叠加覆盖，不要在这里
# 为 SLAM 模式特殊处理。
# 默认 topic 保持 /cmd_vel + /odometry/filtered，launch 文件可覆盖到官方
# diff_drive_controller 的 /diff_drive_controller/cmd_vel_unstamped 和
# /diff_drive_controller/odom。map->odom 由 AMCL 或 slam_toolbox 提供。

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: true
    # 本机算力有限且仿真 RTF 低，实测 10Hz 跟不上（loop missed rate），降到 5
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    # Absolute topic name: must match terrain_speed_filter.speed_limit_topic
    # below exactly, since no node in this stack is namespaced.
    speed_limit_topic: "/speed_limit"

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # 窄门/地形上低速蠕动属正常，进度判据放宽（0.3/20 实测在门口误杀）
      required_movement_radius: 0.15
      movement_time_allowance: 30.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      # 速度包络：崎岖路实测 0.8 m/s 可行，导航留余量取 0.6。
      # 允许倒车：碎石颠偏后贴墙，长车体原地转会把 footprint 扫进膨胀区
      # 致所有轨迹被否决（实测僵死），倒车是唯一逃逸自由度
      min_vel_x: -0.2
      max_vel_x: 0.6
      min_vel_y: 0.0
      max_vel_y: 0.0
      # 滑移转向原地转大量打滑，转速 >0.6 时 10Hz 扫描匹配跟不上里程计
      # 角度误差（实测 1.0 rad/s 自旋恢复后 map 系转歪 102 度），全局限转速
      max_vel_theta: 0.35
      min_speed_xy: 0.0
      max_speed_xy: 0.6
      min_speed_theta: 0.0
      acc_lim_x: 0.8
      acc_lim_y: 0.0
      acc_lim_theta: 0.55
      decel_lim_x: -0.8
      decel_lim_y: 0.0
      decel_lim_theta: -0.55
      vx_samples: 20
      vy_samples: 0
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 1.0
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      # Conservative large-chassis tuning: prefer staying away from walls over
      # tightly hugging the geometric shortest path. ObstacleFootprint rejects
      # footprint collisions; inflation and path costs should already steer the
      # global/local plan toward corridor centers before collision is imminent.
      critics: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "BaseObstacle", "GoalAlign",
                "PathAlign", "PathDist", "GoalDist"]
      ObstacleFootprint.scale: 0.10
      # Use graded local costmap values, not only lethal footprint rejection.
      # This makes DWB prefer lower terrain-cost trajectories when the rolling
      # local costmap includes the terrain-aware static layer.
      BaseObstacle.scale: 0.35
      PathAlign.scale: 18.0
      PathAlign.forward_point_distance: 0.325
      GoalAlign.scale: 16.0
      GoalAlign.forward_point_distance: 0.325
      PathDist.scale: 24.0
      GoalDist.scale: 18.0
      RotateToGoal.scale: 20.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # 2D planning footprint derived from v3 URDF geometry:
      #   half-length 0.56 m ≈ pivot_x(0.34) + arm_length(0.28)*cos(arm_angle(0.698)) = 0.554 m
      #   half-width  0.37 m = pivot_y(0.26) + wheel_lateral_offset(0.07) + wheel_width/2(0.037) = 0.367 m
      footprint: "[[0.56, 0.37], [0.56, -0.37], [-0.56, -0.37], [-0.56, 0.37]]"
      footprint_padding: 0.0
      plugins: ["terrain_static_layer", "obstacle_layer", "inflation_layer"]
      terrain_static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /terrain_cost_map
        map_subscribe_transient_local: true
        trinary_costmap: false
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        # 用姿态门控后的扫描：倾斜帧打地的幻影障碍曾把走廊堵死（导航死锁）
        observation_sources: scan
        scan:
          topic: /scan_gated
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.8
        inflation_radius: 0.55
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.56, 0.37], [0.56, -0.37], [-0.56, -0.37], [-0.56, 0.37]]"
      footprint_padding: 0.0
      resolution: 0.05
      track_unknown_space: true
      # 只用 SLAM 静态地图 + 膨胀，不挂 obstacle_layer：车身在坡上倾斜时
      # 2D 雷达扫描面打地产生幻影障碍，若写入全局 costmap 会永久堵路；
      # 局部 costmap 的 raytrace 清除能自愈，全局交给 SLAM 地图本身
      plugins: ["terrain_static_layer", "inflation_layer"]
      filters: ["terrain_speed_filter"]
      terrain_static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /terrain_cost_map
        map_subscribe_transient_local: true
        # Preserve scaled terrain costs from terrain_cost_map.yaml. With the
        # default trinary conversion, Nav2 would collapse the terrain-aware
        # gray map back into free/occupied cells and lose the traversability cue.
        trinary_costmap: false
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.65
      terrain_speed_filter:
        plugin: "nav2_costmap_2d::SpeedFilter"
        enabled: true
        filter_info_topic: "/speed_costmap_filter_info"
        speed_limit_topic: "/speed_limit"
        transform_tolerance: 0.5
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    # Smac 2D 而非 NavFn：边建图边导航时目标常在未知区深处，NavFn 的
    # 势场梯度提取在均匀未知区域会失败（实测 "Failed to create a plan
    # from potential when a legal potential was found"），Smac 无此缺陷
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      allow_unknown: true
      max_planning_time: 2.0
      downsample_costmap: false
      cost_travel_multiplier: 10.0

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    # 自旋恢复同样受滑移转向打滑约束（见 FollowPath.max_vel_theta 注释）
    max_rotational_vel: 0.3
    min_rotational_vel: 0.2
    rotational_acc_lim: 0.55
